name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: marcador
          POSTGRES_PASSWORD: marcador
          POSTGRES_DB: football_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marcador"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://marcador:marcador@localhost:5432/football_manager?schema=public
      DIRECT_URL: postgresql://marcador:marcador@localhost:5432/football_manager?schema=public
      AUTH_SECRET: ci-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npx prisma migrate deploy

      - run: npm test

      - run: npm run build
